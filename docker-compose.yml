services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: phase-2-jenkins-pipeline-lab
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace

volumes:
  jenkins_home: